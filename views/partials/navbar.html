{{ define "partials/navbar.html" }}
<header class="sticky top-0 z-40 glass-panel border-b border-slate-900">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Brand Logo -->
            <div class="flex items-center">
                <a href="/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-brand-500 to-indigo-400 bg-clip-text text-transparent">EventHub</span>
                </a>
            </div>

            <!-- Center Nav Links -->
            <nav id="main-nav" class="hidden md:flex space-x-6 items-center text-sm font-medium">
                <a href="/" data-nav="cartelera" class="text-slate-300 hover:text-white transition">Cartelera</a>
                {{ if .userID }}
                    <a href="/tablon" data-nav="tablon" class="text-slate-400 hover:text-white transition">Mi Tablón</a>
                    <a href="/eventos/crear" data-nav="crear" class="text-slate-400 hover:text-white transition">Crear Evento</a>
                    <a href="/perfil" data-nav="perfil" class="text-slate-400 hover:text-white transition">Mi Perfil</a>
                    {{ if eq .roleID 1 }}
                        <a href="/admin/usuarios" data-nav="admin" class="text-amber-400 font-semibold hover:text-amber-300 transition">🛡️ Admin</a>
                    {{ end }}
                {{ end }}
            </nav>

            <!-- Right Actions -->
            <div class="flex items-center space-x-4">
                {{ if .userID }}
                    <a href="/perfil" class="flex items-center space-x-2 text-slate-300 hover:text-white text-sm font-medium transition">
                        <span class="text-slate-400 text-sm hidden sm:inline">Hola, <span class="text-brand-100 font-medium">{{ .email }}</span></span>
                    </a>
                    <a href="/perfil" class="px-3 py-1.5 text-xs font-semibold bg-brand-500/10 hover:bg-brand-500/20 text-brand-300 border border-brand-500/20 rounded-lg transition">Mi Perfil</a>
                    <a href="/auth/logout" class="px-4 py-2 text-xs font-semibold bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg transition border border-slate-700">Salir</a>
                {{ else }}
                    <a href="/login" class="text-slate-300 hover:text-white text-sm font-medium transition">Ingresar</a>
                    <a href="/register" class="px-4 py-2 text-xs font-semibold bg-brand-600 hover:bg-brand-500 text-white rounded-lg transition shadow-md shadow-brand-500/10">Registrarse</a>
                {{ end }}
            </div>
        </div>
    </div>
</header>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        const links = document.querySelectorAll('#main-nav a');
        
        links.forEach(link => {
            const href = link.getAttribute('href');
            let isActive = false;
            
            if (href === '/' && currentPath === '/') {
                isActive = true;
            } else if (href !== '/' && (currentPath === href || currentPath.startsWith(href))) {
                isActive = true;
            }

            if (isActive) {
                link.className = "text-brand-400 font-bold bg-brand-500/15 px-3.5 py-1.5 rounded-xl border border-brand-500/30 shadow-sm shadow-brand-500/20 transition";
            }
        });
    });
</script>
{{ end }}
