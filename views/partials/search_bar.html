{{ define "partials/search_bar.html" }}
<form action="/" method="GET" class="w-full">
    <div class="relative flex items-center max-w-xl mx-auto">
        <!-- Search Input -->
        <input type="text" name="search" value="{{ .searchQuery }}" placeholder="Buscar eventos por título, descripción o ubicación..." class="w-full bg-slate-900/80 border border-slate-800 focus:border-brand-500 rounded-xl pl-4 pr-12 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20 transition duration-200">
        
        <!-- Retain category selection if any -->
        {{ if .selectedCategoryID }}
            <input type="hidden" name="category" value="{{ .selectedCategoryID }}">
        {{ end }}
        
        <!-- Submit Button -->
        <button type="submit" class="absolute right-3 p-2 text-slate-400 hover:text-brand-500 transition duration-150">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </button>
    </div>
</form>
{{ end }}
