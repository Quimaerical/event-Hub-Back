{{ define "layouts/base.html" }}
<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}Event Hub - Portal de Eventos{{ end }}</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                        },
                        slate: {
                            950: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.07), transparent 800px),
                        radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.05), transparent 800px);
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-card {
            position: relative;
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: background 0.3s, border-color 0.3s, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                400px circle at var(--mouse-x, 0) var(--mouse-y, 0),
                rgba(139, 92, 246, 0.08),
                transparent 50%
            );
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .glass-card:hover::before {
            opacity: 1;
        }
        .glass-card:hover {
            background: rgba(30, 41, 59, 0.55);
            border-color: rgba(139, 92, 246, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(139, 92, 246, 0.15);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            opacity: 0;
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
    </style>
</head>
<body class="flex flex-col min-h-full">
    <!-- Navbar Partial -->
    {{ template "partials/navbar.html" . }}

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {{ block "content" . }}{{ end }}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-900 py-8 text-center text-slate-500 text-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <p class="font-medium text-slate-400">&copy; 2026 Event Hub. Desarrollado de forma eficiente para Neon & Render.</p>
            <p class="mt-1 text-xs text-slate-600">Limpio • Rápido • Sin dependencias pesadas</p>
        </div>
    </footer>

    <!-- Spotlight Effect & Load Animations Javascript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Card spotlight tracking
            const setupSpotlight = () => {
                document.querySelectorAll('.glass-card').forEach(card => {
                    if (card.dataset.spotlightSetup) return;
                    card.dataset.spotlightSetup = "true";
                    card.addEventListener('mousemove', e => {
                        const rect = card.getBoundingClientRect();
                        const x = e.clientX - rect.left;
                        const y = e.clientY - rect.top;
                        card.style.setProperty('--mouse-x', `${x}px`);
                        card.style.setProperty('--mouse-y', `${y}px`);
                    });
                });
            };

            setupSpotlight();

            // Re-apply spotlight if dynamic elements appear (e.g. searching/filtering)
            const observer = new MutationObserver(setupSpotlight);
            observer.observe(document.body, { childList: true, subtree: true });

            // Form inputs subtle transition focus effects
            document.querySelectorAll('input, select, textarea').forEach(input => {
                const parent = input.parentElement;
                if (!parent) return;
                
                input.addEventListener('focus', () => {
                    parent.style.transform = 'scale(1.005)';
                    parent.style.transition = 'transform 0.2s ease';
                });
                input.addEventListener('blur', () => {
                    parent.style.transform = 'none';
                });
            });
        });
    </script>
</body>
</html>
{{ end }}
