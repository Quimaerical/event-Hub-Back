<script>
        document.addEventListener('DOMContentLoaded', () => {
            const aiBtn = document.getElementById('aiSuggestBtn');
            const descArea = document.getElementById('description');
            const loadingOverlay = document.getElementById('aiLoadingOverlay');
            const titleInput = document.getElementById('title');

            const suggestedText = "¡Únete a nosotros en este increíble evento! Será una jornada llena de aprendizaje, networking y sorpresas. Exploraremos las últimas tendencias y compartiremos conocimientos valiosos. ¡No te lo puedes perder, reserva tu lugar ahora!";

            aiBtn.addEventListener('click', () => {
                // Show loading
                loadingOverlay.classList.remove('opacity-0', 'pointer-events-none');
                descArea.disabled = true;

                // Simulate AI processing time
                setTimeout(() => {
                    // Hide loading
                    loadingOverlay.classList.add('opacity-0', 'pointer-events-none');
                    descArea.disabled = false;
                    
                    // Fill text and trigger visual highlight
                    descArea.value = suggestedText;
                    descArea.classList.add('ring-2', 'ring-[#0ea5e9]', 'border-transparent');
                    
                    setTimeout(() => {
                        descArea.classList.remove('ring-2', 'ring-[#0ea5e9]', 'border-transparent');
                    }, 1500);

                }, 2000);
            });

            // Prevent form submit for demo
            document.getElementById('createEventForm').addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Evento publicado exitosamente (Demo)');
            });
        });
